<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ASCII Art Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        form {
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 400px;
        }

        label {
            font-weight: bold;
            color: #444;
        }

        input[type="text"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            width: 100%;
        }

        .banner-options {
            display: flex;
            gap: 16px;
        }

        input[type="submit"] {
            padding: 10px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #555;
        }

        pre {
            margin-top: 30px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            font-size: 14px;
            overflow-x: auto;
            max-width: 90%;
        }
    </style>
</head>
<body>
    <h1>ASCII Art Generator</h1>

    <form action="/ascii-art" method="POST">
        <label>Enter text:</label>
        <input type="text" name="text" placeholder="Type something...">

        <label>Select banner:</label>
        <div class="banner-options">
            <label><input type="radio" name="banner" value="standard"> Standard</label>
            <label><input type="radio" name="banner" value="shadow"> Shadow</label>
            <label><input type="radio" name="banner" value="thinkertoy"> Thinkertoy</label>
        </div>

        <input type="submit" value="Generate">
    </form>

    <pre>{{ . }}</pre>
</body>
</html>
